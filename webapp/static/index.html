<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperDRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Title bar -->
    <header id="title-bar">
        <span id="brand">SuperDRO</span>
        <div id="connection-status">
            <span id="mode-badge" class="mode-badge hidden"></span>
            <span id="status-dot" class="dot dot-red"></span>
            <span id="status-text">Disconnected</span>
            <button class="reconnect-btn" onclick="reconnectWs()" title="Reconnect">&#x21bb;</button>
        </div>
    </header>

    <!-- Main content: toolbar + workspace + status bar -->
    <div id="main-content">

        <!-- Left toolbar -->
        <nav id="toolbar-left">
            <button class="tb-btn active" data-tab="dro" onclick="switchTab('dro')" title="DRO">DRO</button>
            <button class="tb-btn" data-tab="config" onclick="switchTab('config')" title="Configuration">CFG</button>
            <button class="tb-btn" data-tab="tool" onclick="switchTab('tool')" title="Tool Offsets">TOOL</button>
            <button class="tb-btn" data-tab="els" onclick="switchTab('els')" title="Threading / ELS">ELS</button>
            <hr class="tb-sep">
            <button class="tb-btn" onclick="zeroAll()" title="Zero All Axes">0&rarr;</button>
            <button class="tb-btn" id="unit-toggle" onclick="toggleUnit()" title="Toggle mm/in">mm</button>
            <button class="tb-btn" id="xmode-toggle" onclick="toggleXMode()" title="Toggle Diameter/Radius">DIA</button>
        </nav>

        <!-- DRO Tab — Center workspace -->
        <main id="tab-dro" class="tab-content active">
            <div class="workspace">
                <!-- X Axis row -->
                <div class="axis-row" data-axis="x">
                    <div class="axis-label-group">
                        <span class="axis-tag">X</span>
                        <span class="axis-mode" id="x-sublabel">DIA</span>
                    </div>
                    <div class="axis-readout" id="x-value">+0.000</div>
                    <span class="axis-unit" id="x-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="btn" onclick="zeroAxis('x')">ZERO</button>
                        <button class="btn" onclick="showPreset('x')">SET</button>
                    </div>
                </div>

                <!-- Z Axis row -->
                <div class="axis-row" data-axis="z">
                    <div class="axis-label-group">
                        <span class="axis-tag">Z</span>
                    </div>
                    <div class="axis-readout" id="z-value">+0.000</div>
                    <span class="axis-unit" id="z-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="btn" onclick="zeroAxis('z')">ZERO</button>
                        <button class="btn" onclick="showPreset('z')">SET</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Config Tab -->
        <main id="tab-config" class="tab-content">
            <div id="config-header">
                <h2>Machine Configuration</h2>
                <div id="config-actions">
                    <button class="btn" onclick="loadConfig()">LOAD</button>
                    <button class="btn" onclick="saveConfig()">SAVE</button>
                </div>
            </div>
            <div id="config-categories"></div>
        </main>

        <!-- Tool Tab -->
        <main id="tab-tool" class="tab-content">
            <div id="tool-header">
                <h2>Tool Offsets</h2>
                <div id="tool-actions">
                    <button class="btn" onclick="addTool()">ADD TOOL</button>
                </div>
            </div>
            <table id="tool-table">
                <thead>
                    <tr>
                        <th>Tool</th>
                        <th>Label</th>
                        <th>X Offset</th>
                        <th>Z Offset</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tool-table-body"></tbody>
            </table>
        </main>

        <!-- ELS Tab -->
        <main id="tab-els" class="tab-content">
            <div class="els-layout">
                <!-- Left panel: pitch selection -->
                <div class="els-select-panel">
                    <div class="els-header">
                        <h2>Electronic Leadscrew</h2>
                    </div>

                    <!-- Thread type tabs -->
                    <div class="els-type-tabs">
                        <button class="els-type-btn active" data-type="metric"
                                onclick="switchElsType('metric')">METRIC</button>
                        <button class="els-type-btn" data-type="imperial"
                                onclick="switchElsType('imperial')">IMPERIAL</button>
                    </div>

                    <!-- Coarse/Fine sub-filter -->
                    <div class="els-grade-tabs">
                        <button class="els-grade-btn active" data-grade="coarse"
                                onclick="switchElsGrade('coarse')">COARSE</button>
                        <button class="els-grade-btn" data-grade="fine"
                                onclick="switchElsGrade('fine')">FINE</button>
                    </div>

                    <!-- Pitch grid -->
                    <div id="els-pitch-grid" class="els-pitch-grid"></div>

                    <!-- Custom pitch entry -->
                    <div class="els-custom-row">
                        <label class="els-custom-label">Custom:</label>
                        <input type="number" id="els-custom-pitch" class="els-custom-input"
                               step="any" placeholder="pitch"
                               onkeydown="if(event.key==='Enter')setCustomPitch()">
                        <span class="els-custom-unit" id="els-custom-unit">mm</span>
                        <button class="btn btn-small" onclick="setCustomPitch()">SET</button>
                    </div>
                </div>

                <!-- Right panel: controls + live display -->
                <div class="els-control-panel">
                    <!-- Direction -->
                    <div class="els-control-group">
                        <div class="els-control-label">DIRECTION</div>
                        <div class="els-btn-group">
                            <button class="btn els-dir-btn active" data-dir="rh"
                                    onclick="setElsDir('rh')">RH</button>
                            <button class="btn els-dir-btn" data-dir="lh"
                                    onclick="setElsDir('lh')">LH</button>
                        </div>
                    </div>

                    <!-- Retract mode -->
                    <div class="els-control-group">
                        <div class="els-control-label">RETRACT</div>
                        <div class="els-btn-group">
                            <button class="btn els-retract-btn active" data-mode="rapid"
                                    onclick="setElsRetract('rapid')">RAPID</button>
                            <button class="btn els-retract-btn" data-mode="spring"
                                    onclick="setElsRetract('spring')">SPRING</button>
                        </div>
                    </div>

                    <!-- State indicator -->
                    <div class="els-control-group">
                        <div class="els-control-label">STATE</div>
                        <div class="els-state-badge els-state-disengaged" id="els-state-indicator">DISENGAGED</div>
                    </div>

                    <!-- Live values -->
                    <div class="els-live-display">
                        <div class="els-live-row">
                            <span class="els-live-label">PITCH</span>
                            <span class="els-live-value" id="els-live-pitch">---</span>
                        </div>
                        <div class="els-live-row">
                            <span class="els-live-label">DIR</span>
                            <span class="els-live-value" id="els-live-dir">RH</span>
                        </div>
                        <div class="els-live-row">
                            <span class="els-live-label">RPM</span>
                            <span class="els-live-value" id="els-live-rpm">0</span>
                        </div>
                        <div class="els-live-row">
                            <span class="els-live-label">Z POS</span>
                            <span class="els-live-value" id="els-live-z">+0.000</span>
                        </div>
                        <div class="els-live-row">
                            <span class="els-live-label">PASS</span>
                            <span class="els-live-value" id="els-live-pass">---</span>
                        </div>
                    </div>

                    <!-- Engage / Feed Hold buttons -->
                    <div class="els-action-buttons">
                        <button class="btn els-engage-btn" id="els-engage-btn"
                                onclick="elsEngage()" disabled>ENGAGE</button>
                        <button class="btn els-hold-btn" onclick="elsFeedHold()">FEED HOLD</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right status bar -->
        <aside id="status-bar">
            <!-- RPM section -->
            <div class="sb-section">
                <div class="sb-label">RPM</div>
                <div class="sb-rpm" id="rpm-value">0</div>
            </div>
            <hr class="sb-sep">
            <!-- State section -->
            <div class="sb-section">
                <div class="sb-label">STATE</div>
                <div class="state-badge" id="state-indicator">IDLE</div>
            </div>
            <hr class="sb-sep">
            <!-- Active tool section -->
            <div class="sb-section">
                <div class="sb-label">TOOL</div>
                <div class="active-tool" id="active-tool-display">---</div>
            </div>
            <hr class="sb-sep">
            <!-- Saved positions section -->
            <div class="sb-section sb-positions">
                <div class="sb-positions-header">
                    <div class="sb-label">POSITIONS</div>
                    <button class="btn btn-small" onclick="saveCurrentPosition()">+</button>
                </div>
                <div id="saved-positions" class="saved-list"></div>
                <div class="sb-positions-footer">
                    <button class="btn btn-small btn-dim" onclick="clearAllPositions()">CLEAR</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Alarm banner -->
    <div id="alarm-banner" class="hidden">ALARM</div>

    <!-- Preset dialog -->
    <div id="preset-overlay" class="dialog-overlay hidden" onclick="cancelPreset()">
        <div class="dialog" onclick="event.stopPropagation()">
            <h3 id="preset-title">Set X Position</h3>
            <input type="number" id="preset-input" step="any" placeholder="0.000"
                   onkeydown="if(event.key==='Enter')confirmPreset()">
            <div class="dialog-buttons">
                <button class="btn" onclick="cancelPreset()">Cancel</button>
                <button class="btn btn-accent" onclick="confirmPreset()">SET</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
