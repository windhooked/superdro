<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperDRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top bar -->
    <header id="top-bar">
        <div id="connection-status">
            <span id="status-dot" class="dot dot-red"></span>
            <span id="status-text">Disconnected</span>
        </div>
        <nav id="tabs">
            <button class="tab-btn active" data-tab="dro" onclick="switchTab('dro')">DRO</button>
            <button class="tab-btn" data-tab="config" onclick="switchTab('config')">Config</button>
        </nav>
        <div id="toggles">
            <button id="unit-toggle" class="toggle-btn" onclick="toggleUnit()">mm</button>
            <button id="xmode-toggle" class="toggle-btn" onclick="toggleXMode()">DIA</button>
            <button id="panel-toggle" class="toggle-btn" onclick="toggleSidePanel()">&#9776;</button>
        </div>
    </header>

    <!-- DRO Tab -->
    <main id="tab-dro" class="tab-content active">
        <div class="dro-layout">
            <!-- Main readout area -->
            <div class="dro-main">
                <!-- RPM bar -->
                <div class="rpm-bar">
                    <span class="rpm-label">RPM</span>
                    <span class="rpm-value" id="rpm-value">0</span>
                    <span class="state-badge" id="state-indicator">IDLE</span>
                </div>

                <!-- X Axis row -->
                <div class="axis-row">
                    <div class="axis-label-group">
                        <span class="axis-tag">X</span>
                        <span class="axis-mode" id="x-sublabel">DIA</span>
                    </div>
                    <div class="axis-readout" id="x-value">+0.000</div>
                    <span class="axis-unit" id="x-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="axis-btn" onclick="zeroAxis('x')">ZERO</button>
                        <button class="axis-btn" onclick="showPreset('x')">SET</button>
                    </div>
                </div>

                <!-- Z Axis row -->
                <div class="axis-row">
                    <div class="axis-label-group">
                        <span class="axis-tag">Z</span>
                    </div>
                    <div class="axis-readout" id="z-value">+0.000</div>
                    <span class="axis-unit" id="z-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="axis-btn" onclick="zeroAxis('z')">ZERO</button>
                        <button class="axis-btn" onclick="showPreset('z')">SET</button>
                    </div>
                </div>
            </div>

            <!-- Side panel (saved coordinates) -->
            <aside id="side-panel" class="side-panel collapsed">
                <div class="side-panel-header">
                    <h3>Saved Positions</h3>
                    <button class="axis-btn btn-small" onclick="saveCurrentPosition()">+</button>
                </div>
                <div id="saved-positions" class="saved-list"></div>
                <div class="side-panel-footer">
                    <button class="axis-btn btn-small btn-dim" onclick="clearAllPositions()">CLEAR ALL</button>
                </div>
            </aside>
        </div>
    </main>

    <!-- Config Tab -->
    <main id="tab-config" class="tab-content">
        <div id="config-header">
            <h2>Machine Configuration</h2>
            <div id="config-actions">
                <button class="axis-btn" onclick="loadConfig()">LOAD</button>
                <button class="axis-btn" onclick="saveConfig()">SAVE</button>
            </div>
        </div>
        <div id="config-categories"></div>
    </main>

    <!-- Alarm banner -->
    <div id="alarm-banner" class="hidden">ALARM</div>

    <!-- Preset dialog -->
    <div id="preset-overlay" class="dialog-overlay hidden" onclick="cancelPreset()">
        <div class="dialog" onclick="event.stopPropagation()">
            <h3 id="preset-title">Set X Position</h3>
            <input type="number" id="preset-input" step="any" placeholder="0.000"
                   onkeydown="if(event.key==='Enter')confirmPreset()">
            <div class="dialog-buttons">
                <button class="axis-btn" onclick="cancelPreset()">Cancel</button>
                <button class="axis-btn btn-green" onclick="confirmPreset()">SET</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
