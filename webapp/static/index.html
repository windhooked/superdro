<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperDRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Title bar -->
    <header id="title-bar">
        <span id="brand">SuperDRO</span>
        <div id="connection-status">
            <span id="status-dot" class="dot dot-red"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <!-- Main content: toolbar + workspace + status bar -->
    <div id="main-content">

        <!-- Left toolbar -->
        <nav id="toolbar-left">
            <button class="tb-btn active" data-tab="dro" onclick="switchTab('dro')" title="DRO">DRO</button>
            <button class="tb-btn" data-tab="config" onclick="switchTab('config')" title="Configuration">CFG</button>
            <hr class="tb-sep">
            <button class="tb-btn" onclick="zeroAll()" title="Zero All Axes">0&rarr;</button>
            <button class="tb-btn" id="unit-toggle" onclick="toggleUnit()" title="Toggle mm/in">mm</button>
            <button class="tb-btn" id="xmode-toggle" onclick="toggleXMode()" title="Toggle Diameter/Radius">DIA</button>
        </nav>

        <!-- DRO Tab — Center workspace -->
        <main id="tab-dro" class="tab-content active">
            <div class="workspace">
                <!-- X Axis row -->
                <div class="axis-row" data-axis="x">
                    <div class="axis-label-group">
                        <span class="axis-tag">X</span>
                        <span class="axis-mode" id="x-sublabel">DIA</span>
                    </div>
                    <div class="axis-readout" id="x-value">+0.000</div>
                    <span class="axis-unit" id="x-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="btn" onclick="zeroAxis('x')">ZERO</button>
                        <button class="btn" onclick="showPreset('x')">SET</button>
                    </div>
                </div>

                <!-- Z Axis row -->
                <div class="axis-row" data-axis="z">
                    <div class="axis-label-group">
                        <span class="axis-tag">Z</span>
                    </div>
                    <div class="axis-readout" id="z-value">+0.000</div>
                    <span class="axis-unit" id="z-unit">mm</span>
                    <div class="axis-buttons">
                        <button class="btn" onclick="zeroAxis('z')">ZERO</button>
                        <button class="btn" onclick="showPreset('z')">SET</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Config Tab -->
        <main id="tab-config" class="tab-content">
            <div id="config-header">
                <h2>Machine Configuration</h2>
                <div id="config-actions">
                    <button class="btn" onclick="loadConfig()">LOAD</button>
                    <button class="btn" onclick="saveConfig()">SAVE</button>
                </div>
            </div>
            <div id="config-categories"></div>
        </main>

        <!-- Right status bar -->
        <aside id="status-bar">
            <!-- RPM section -->
            <div class="sb-section">
                <div class="sb-label">RPM</div>
                <div class="sb-rpm" id="rpm-value">0</div>
            </div>
            <hr class="sb-sep">
            <!-- State section -->
            <div class="sb-section">
                <div class="sb-label">STATE</div>
                <div class="state-badge" id="state-indicator">IDLE</div>
            </div>
            <hr class="sb-sep">
            <!-- Saved positions section -->
            <div class="sb-section sb-positions">
                <div class="sb-positions-header">
                    <div class="sb-label">POSITIONS</div>
                    <button class="btn btn-small" onclick="saveCurrentPosition()">+</button>
                </div>
                <div id="saved-positions" class="saved-list"></div>
                <div class="sb-positions-footer">
                    <button class="btn btn-small btn-dim" onclick="clearAllPositions()">CLEAR</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Alarm banner -->
    <div id="alarm-banner" class="hidden">ALARM</div>

    <!-- Preset dialog -->
    <div id="preset-overlay" class="dialog-overlay hidden" onclick="cancelPreset()">
        <div class="dialog" onclick="event.stopPropagation()">
            <h3 id="preset-title">Set X Position</h3>
            <input type="number" id="preset-input" step="any" placeholder="0.000"
                   onkeydown="if(event.key==='Enter')confirmPreset()">
            <div class="dialog-buttons">
                <button class="btn" onclick="cancelPreset()">Cancel</button>
                <button class="btn btn-accent" onclick="confirmPreset()">SET</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
